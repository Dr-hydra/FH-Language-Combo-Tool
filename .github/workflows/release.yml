name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout FH Language Combo Tool
        uses: actions/checkout@v4

      - name: Checkout QING.UIKIT
        uses: actions/checkout@v4
        with:
          repository: Dr-hydra/QING.UIKIT
          ref: c71744954b426d523ed97801d544685dccb4a0b6
          path: external/QING.UIKIT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore QING.UIKIT
        shell: pwsh
        run: >
          dotnet restore
          external/QING.UIKIT/src/QING.UIKIT/QING.UIKIT.vbproj

      - name: Restore FH Language Combo Tool
        shell: pwsh
        run: >
          dotnet restore
          dotnet/src/FH.LanguageComboTool.Wpf/FH.LanguageComboTool.Wpf.csproj
          -p:QingUiKitRoot="${{ github.workspace }}\external\QING.UIKIT"

      - name: Test
        shell: pwsh
        run: >
          dotnet test
          dotnet/tests/FH.LanguageComboTool.Core.Tests/FH.LanguageComboTool.Core.Tests.csproj
          --configuration Release

      - name: Publish self-contained win-x64
        shell: pwsh
        run: >
          dotnet publish
          dotnet/src/FH.LanguageComboTool.Wpf/FH.LanguageComboTool.Wpf.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishTrimmed=false
          -p:SatelliteResourceLanguages=en%3Bzh-Hans
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:CopyOutputSymbolsToPublishDirectory=false
          -p:QingUiKitRoot="${{ github.workspace }}\external\QING.UIKIT"
          -o artifacts/self-contained

      - name: Publish framework-dependent win-x64
        shell: pwsh
        run: >
          dotnet publish
          dotnet/src/FH.LanguageComboTool.Wpf/FH.LanguageComboTool.Wpf.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:CopyOutputSymbolsToPublishDirectory=false
          -p:QingUiKitRoot="${{ github.workspace }}\external\QING.UIKIT"
          -o artifacts/framework-dependent

      - name: Prepare release files
        shell: pwsh
        run: |
          Move-Item `
            artifacts/self-contained/FH.LanguageComboTool.Wpf.exe `
            FH-Language-Combo-Tool-win-x64-self-contained.exe
          Move-Item `
            artifacts/framework-dependent/FH.LanguageComboTool.Wpf.exe `
            FH-Language-Combo-Tool-win-x64-framework-dependent.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FH-Language-Combo-Tool-win-x64-self-contained.exe
            FH-Language-Combo-Tool-win-x64-framework-dependent.exe
          body: |
            ## Downloads

            - **Self-contained**: no .NET installation required.
            - **Framework-dependent**: smaller download; requires the .NET 10 Desktop Runtime x64.

            Both files are single-executable Windows x64 builds.
          generate_release_notes: true

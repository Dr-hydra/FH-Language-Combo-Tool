name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout FH Language Combo Tool
        uses: actions/checkout@v4

      - name: Checkout QING.UIKIT
        uses: actions/checkout@v4
        with:
          repository: Dr-hydra/QING.UIKIT
          ref: c71744954b426d523ed97801d544685dccb4a0b6
          path: external/QING.UIKIT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore QING.UIKIT
        shell: pwsh
        run: >
          dotnet restore
          external/QING.UIKIT/src/QING.UIKIT/QING.UIKIT.vbproj

      - name: Restore FH Language Combo Tool
        shell: pwsh
        run: >
          dotnet restore
          dotnet/src/FH.LanguageComboTool.Wpf/FH.LanguageComboTool.Wpf.csproj
          -p:QingUiKitRoot="${{ github.workspace }}\external\QING.UIKIT"

      - name: Test
        shell: pwsh
        run: >
          dotnet test
          dotnet/tests/FH.LanguageComboTool.Core.Tests/FH.LanguageComboTool.Core.Tests.csproj
          --configuration Release

      - name: Publish self-contained win-x64
        shell: pwsh
        run: >
          dotnet publish
          dotnet/src/FH.LanguageComboTool.Wpf/FH.LanguageComboTool.Wpf.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:PublishTrimmed=false
          -p:SatelliteResourceLanguages=en%3Bzh-Hans
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:CopyOutputSymbolsToPublishDirectory=false
          -p:QingUiKitRoot="${{ github.workspace }}\external\QING.UIKIT"
          -o artifacts/self-contained

      - name: Publish framework-dependent win-x64
        shell: pwsh
        run: >
          dotnet publish
          dotnet/src/FH.LanguageComboTool.Wpf/FH.LanguageComboTool.Wpf.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:CopyOutputSymbolsToPublishDirectory=false
          -p:QingUiKitRoot="${{ github.workspace }}\external\QING.UIKIT"
          -o artifacts/framework-dependent

      - name: Prepare release files
        shell: pwsh
        run: |
          Move-Item `
            artifacts/self-contained/FH.LanguageComboTool.Wpf.exe `
            FH-Language-Combo-Tool-win-x64-self-contained.exe
          Move-Item `
            artifacts/framework-dependent/FH.LanguageComboTool.Wpf.exe `
            FH-Language-Combo-Tool-win-x64-framework-dependent.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FH-Language-Combo-Tool-win-x64-self-contained.exe
            FH-Language-Combo-Tool-win-x64-framework-dependent.exe
          body: |
            ## 本次更新

            - 修正 Xbox 版《Forza Horizon 6》安装目录识别方式。
            - 移除对固定 `XboxGames\Forza Horizon 6` 路径的依赖。
            - Xbox 版改为由用户选择 `Forza Horizon 6 (Xbox)` 并手动指定实际安装目录。
            - 软件会验证游戏可执行文件、`StringTables` 资源目录及语言包数量。
            - 支持资源文件直接位于游戏根目录或 `Content` 子目录。
            - 优化 Xbox 版额外语言包下载提示。

            ## 下载说明

            - **自包含版**：无需安装 .NET 运行时，推荐普通用户使用。
            - **框架依赖版**：体积更小，需要安装 .NET 10 Desktop Runtime x64。

            两个文件均为 Windows x64 单文件程序。
          generate_release_notes: false
